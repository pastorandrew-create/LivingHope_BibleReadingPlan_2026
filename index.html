<div id="lhBibleApp" style="max-width:900px; margin:auto; font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height:1.4; color:#111;">
  <h2 style="margin-bottom:.25rem;">Daily Bible Reading</h2>

  <div style="display:flex; gap:.75rem; flex-wrap:wrap; align-items:center; margin:.5rem 0 1rem;">
    <label style="color:#111;">
      Date:
      <input id="lhDatePicker" type="date" style="padding:.25rem .4rem;" />
    </label>

    <span style="color:#111; font-size:.95em;">Quick links:</span>
    <div id="lhWeekLinks" style="display:flex; gap:.4rem; flex-wrap:wrap;"></div>

    <label style="margin-left:auto; display:flex; align-items:center; gap:.4rem; color:#111;">
      <input id="lhReadingModeToggle" type="checkbox" />
      <span style="font-weight:600;">Reading mode</span>
    </label>
  </div>

  <h3 id="lhReadingRef" style="margin:.25rem 0; color:#111;"></h3>

  <div id="lhReadingTextWrap" class="lh-reading-wrap" style="margin-top:.75rem;">
    <div id="lhReadingText" class="lh-reading-text">Pick a date.</div>
  </div>

  <p style="font-size:.8em; color:#555; margin-top:2em;">
    Scripture quotations are from the ESV&reg; Bible (The Holy Bible, English Standard Version&reg;),
    copyright &copy; 2001 by Crossway, a publishing ministry of Good News Publishers.
    Used by permission. All rights reserved.
  </p>
</div>

<style>
  #lhBibleApp .lh-reading-wrap {
    color:#111;
  }

  #lhBibleApp .lh-reading-text {
    white-space:pre-wrap;
    text-align:left;
    line-height:1.6;
    font-size:1rem;
  }

  #lhBibleApp .lh-vnum {
    font-size:.82em;
    opacity:.65;
    font-weight:500;
  }

  #lhBibleApp .lh-poetry {
    margin:0;
    padding-left:1.1em;
    text-indent:-1.1em;
  }

  #lhBibleApp .lh-poetry .lh-line {
    display:block;
    padding-left:1.1em;
    text-indent:-1.1em;
  }

  #lhBibleApp.lh-reading-mode .lh-reading-text {
    font-size:1.15rem;
    line-height:1.85;
    max-width:42em;
    margin:0 auto;
  }

  #lhBibleApp.lh-reading-mode .lh-reading-wrap {
    background:#faf7f0;
    border:1px solid #e6e0d6;
    border-radius:.75rem;
    padding:1rem;
  }

  @media (max-width:520px) {
    #lhBibleApp.lh-reading-mode .lh-reading-text {
      font-size:1.2rem;
      line-height:1.9;
    }
  }
</style>

<script>
(function () {
  var CSV_URL = "https://raw.githubusercontent.com/pastorandrew-create/LivingHope_BibleReadingPlan_2026/main/Living_Hope_2026_Bible_Reading_App.csv";
  var API_PROXY = "https://esv-proxy.onrender.com/passage";

  var app = document.getElementById("lhBibleApp");
  var picker = document.getElementById("lhDatePicker");
  var toggle = document.getElementById("lhReadingModeToggle");
  var refEl = document.getElementById("lhReadingRef");
  var textEl = document.getElementById("lhReadingText");
  var weekLinksEl = document.getElementById("lhWeekLinks");

  function isoToday() {
    var d = new Date();
    d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
    return d.toISOString().slice(0, 10);
  }

  function addDaysISO(iso, n) {
    var d = new Date(iso + "T00:00:00");
    d.setDate(d.getDate() + n);
    return d.toISOString().slice(0, 10);
  }

  function getMondayISO(iso) {
    var d = new Date(iso + "T00:00:00");
    var day = d.getDay();
    var diff = (day === 0 ? -6 : 1) - day;
    d.setDate(d.getDate() + diff);
    return d.toISOString().slice(0, 10);
  }

  function formatShort(iso) {
    var d = new Date(iso + "T00:00:00");
    return d.toLocaleDateString(undefined, { weekday: "short" });
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function loadCSV(url) {
    return fetch(url, { cache: "no-store" })
      .then(function (res) {
        if (!res.ok) throw new Error("Could not load reading plan.");
        return res.text();
      })
      .then(function (text) {
        var lines = text.trim().split(/\r?\n/);
        var plan = {};
        lines.slice(1).forEach(function (line) {
          var parts = line.split(/,(.+)/);
          var date = (parts[0] || "").trim();
          var reading = (parts[1] || "").trim();
          if (date && reading) plan[date] = reading;
        });
        return plan;
      });
  }

  function wrapVerseNumbers(html) {
    return html
      .replace(/(^|<br>|\n)(\d{1,3})(\s)/g, '$1<span class="lh-vnum">$2</span>$3')
      .replace(/(\s)(\d{1,3})(\s)/g, '$1<span class="lh-vnum">$2</span>$3');
  }

  function formatText(rawText) {
    var lines = rawText.split("\n");
    var candidates = lines.filter(function (l) {
      return l.trim().length > 0;
    });

    var shortLines = candidates.filter(function (l) {
      return l.trim().length <= 55;
    }).length;

    var spacedLines = candidates.filter(function (l) {
      return /^\s{2,}/.test(l);
    }).length;

    var isPoetry =
      candidates.length >= 4 &&
      (spacedLines >= Math.max(2, candidates.length * .25) ||
       shortLines >= candidates.length * .7);

    var html;

    if (isPoetry) {
      html = '<div class="lh-poetry">' + lines.map(function (line) {
        if (!line.trim()) return '<span class="lh-line"><br></span>';
        return '<span class="lh-line">' + escapeHtml(line) + '</span>';
      }).join("") + "</div>";
    } else {
      html = escapeHtml(rawText).replace(/\n/g, "<br>");
    }

    return wrapVerseNumbers(html);
  }

  function setReadingMode(enabled) {
    if (enabled) app.classList.add("lh-reading-mode");
    else app.classList.remove("lh-reading-mode");

    try {
      localStorage.setItem("lh_reading_mode", enabled ? "1" : "0");
    } catch (e) {}
  }

  function getReadingMode() {
    try {
      return localStorage.getItem("lh_reading_mode") === "1";
    } catch (e) {
      return false;
    }
  }

  function renderWeekLinks(plan, anchorISO, onPick) {
    weekLinksEl.innerHTML = "";
    var mondayISO = getMondayISO(anchorISO);

    for (var i = 0; i < 6; i++) {
      var dISO = addDaysISO(mondayISO, i);
      var hasReading = !!plan[dISO];

      var btn = document.createElement("button");
      btn.type = "button";
      btn.textContent = formatShort(dISO);
      btn.disabled = !hasReading;

      btn.style.padding = ".28rem .55rem";
      btn.style.border = "1px solid #111";
      btn.style.borderRadius = ".45rem";
      btn.style.background = hasReading ? "#fff" : "#eee";
      btn.style.color = "#111";
      btn.style.fontWeight = "600";
      btn.style.cursor = hasReading ? "pointer" : "not-allowed";
      btn.style.opacity = hasReading ? "1" : ".55";

      btn.addEventListener("click", function (event) {
        onPick(event.target.getAttribute("data-date"));
      });

      btn.setAttribute("data-date", dISO);
      weekLinksEl.appendChild(btn);
    }
  }

  function loadReading(plan, dateISO) {
    var ref = plan[dateISO];
    var today = isoToday();

    if (!ref) {
      refEl.textContent = dateISO === today
        ? "Today — No reading scheduled"
        : dateISO + " — No reading scheduled";
      textEl.textContent = "";
      return;
    }

    refEl.textContent = dateISO === today
      ? "Today — " + ref
      : dateISO + " — " + ref;

    textEl.textContent = "Loading…";

    fetch(API_PROXY + "?q=" + encodeURIComponent(ref), { cache: "no-store" })
      .then(function (res) {
        return res.json().then(function (data) {
          return { ok: res.ok, data: data };
        });
      })
      .then(function (result) {
        if (!result.ok) {
          textEl.textContent =
            result.data.error ||
            result.data.detail ||
            "Unable to load passage.";
          return;
        }

        textEl.innerHTML = formatText(result.data.text || "");
      })
      .catch(function () {
        textEl.textContent =
          "Error loading passage. Refresh once if the service is waking up.";
      });
  }

  loadCSV(CSV_URL)
    .then(function (plan) {
      function pickDate(iso) {
        picker.value = iso;
        renderWeekLinks(plan, iso, pickDate);
        loadReading(plan, iso);
      }

      toggle.checked = getReadingMode();
      setReadingMode(toggle.checked);

      toggle.addEventListener("change", function () {
        setReadingMode(toggle.checked);
      });

      picker.addEventListener("change", function () {
        pickDate(picker.value);
      });

      pickDate(isoToday());
    })
    .catch(function () {
      refEl.textContent = "Reading plan unavailable";
      textEl.textContent = "The reading plan could not be loaded.";
    });
})();
</script>
