<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Living Hope Bible Reading Plan</title>

  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #555555;
      --card: #faf7f0;
      --border: #e6e0d6;
      --button: #ffffff;
    }

    body.dark {
      --bg: #111111;
      --text: #f4f4f4;
      --muted: #cccccc;
      --card: #1d1d1d;
      --border: #444444;
      --button: #222222;
    }

    body {
      margin: 0;
      padding: 1rem;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.4;
    }

    .app {
      max-width: 900px;
      margin: auto;
    }

    .controls {
      display: flex;
      gap: .75rem;
      flex-wrap: wrap;
      align-items: center;
      margin: .5rem 0 1rem;
    }

    button, input[type="date"] {
      padding: .35rem .6rem;
      border: 1px solid var(--text);
      border-radius: .45rem;
      background: var(--button);
      color: var(--text);
      font-weight: 600;
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .week-links {
      display: flex;
      gap: .4rem;
      flex-wrap: wrap;
    }

    .reading-wrap {
      margin-top: .75rem;
    }

    .reading-text {
      white-space: pre-wrap;
      text-align: left;
      line-height: 1.65;
      font-size: 1rem;
    }

    .vnum {
      font-size: .82em;
      opacity: .65;
      font-weight: 500;
    }

    .poetry {
      margin: 0;
      padding-left: 1.1em;
      text-indent: -1.1em;
    }

    .poetry .line {
      display: block;
      padding-left: 1.1em;
      text-indent: -1.1em;
    }

    body.reading-mode .reading-text {
      font-size: 1.15rem;
      line-height: 1.85;
      max-width: 42em;
      margin: 0 auto;
    }

    body.reading-mode .reading-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: .75rem;
      padding: 1rem;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
      margin: .75rem 0;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--text);
      opacity: .75;
    }

    .footer {
      font-size: .8em;
      color: var(--muted);
      margin-top: 2em;
    }

    @media (max-width: 520px) {
      body {
        padding: .75rem;
      }

      body.reading-mode .reading-text {
        font-size: 1.2rem;
        line-height: 1.9;
      }

      .controls {
        align-items: stretch;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <h2>Daily Bible Reading</h2>

    <div class="controls">
      <label>
        Date:
        <input id="datePicker" type="date" />
      </label>

      <button id="prevBtn" type="button">← Previous</button>
      <button id="nextBtn" type="button">Next →</button>

      <span>Quick links:</span>
      <div id="weekLinks" class="week-links"></div>

      <label>
        <input id="readingModeToggle" type="checkbox" />
        Reading mode
      </label>

      <label>
        <input id="darkModeToggle" type="checkbox" />
        Dark mode
      </label>

      <label>
        <input id="readToggle" type="checkbox" />
        Mark as read
      </label>
    </div>

    <div class="progress-bar" aria-label="Weekly reading progress">
      <div id="progressFill" class="progress-fill"></div>
    </div>

    <h3 id="readingRef"></h3>

    <div id="readingTextWrap" class="reading-wrap">
      <div id="readingText" class="reading-text">Pick a date.</div>
    </div>

    <p class="footer">
      Scripture quotations are from the ESV&reg; Bible (The Holy Bible, English Standard Version&reg;),
      copyright &copy; 2001 by Crossway, a publishing ministry of Good News Publishers.
      Used by permission. All rights reserved.
    </p>
  </div>

  <script>
    const CSV_URL = "https://raw.githubusercontent.com/pastorandrew-create/LivingHope_BibleReadingPlan_2026/main/Living_Hope_2026_Bible_Reading_App.csv";
    const API_PROXY = "https://esv-proxy.onrender.com/passage";

    const CACHE_PREFIX = "lh_esv_cache_v1_";
    const READ_PREFIX = "lh_read_";

    const picker = document.getElementById("datePicker");
    const readingRef = document.getElementById("readingRef");
    const readingText = document.getElementById("readingText");
    const weekLinks = document.getElementById("weekLinks");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const readingModeToggle = document.getElementById("readingModeToggle");
    const darkModeToggle = document.getElementById("darkModeToggle");
    const readToggle = document.getElementById("readToggle");
    const progressFill = document.getElementById("progressFill");

    let plan = {};
    let currentDate = "";

    function isoToday() {
      const d = new Date();
      d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
      return d.toISOString().slice(0, 10);
    }

    function addDaysISO(iso, n) {
      const d = new Date(iso + "T00:00:00");
      d.setDate(d.getDate() + n);
      return d.toISOString().slice(0, 10);
    }

    function getMondayISO(iso) {
      const d = new Date(iso + "T00:00:00");
      const day = d.getDay();
      const diff = (day === 0 ? -6 : 1) - day;
      d.setDate(d.getDate() + diff);
      return d.toISOString().slice(0, 10);
    }

    function formatShort(iso) {
      return new Date(iso + "T00:00:00").toLocaleDateString(undefined, {
        weekday: "short"
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function loadCSV() {
      const res = await fetch(CSV_URL, { cache: "no-store" });
      if (!res.ok) throw new Error("Could not load CSV.");

      const text = await res.text();
      const lines = text.trim().split(/\r?\n/);

      lines.slice(1).forEach(line => {
        const [date, reading] = line.split(/,(.+)/);
        if (date && reading) {
          plan[date.trim()] = reading.trim();
        }
      });
    }

    function cacheKey(ref) {
      return CACHE_PREFIX + ref;
    }

    function getCachedPassage(ref) {
      try {
        const cached = localStorage.getItem(cacheKey(ref));
        if (!cached) return null;

        const parsed = JSON.parse(cached);
        return parsed.text || null;
      } catch {
        return null;
      }
    }

    function setCachedPassage(ref, text) {
      try {
        localStorage.setItem(cacheKey(ref), JSON.stringify({
          ref,
          text,
          savedAt: new Date().toISOString()
        }));
      } catch {}
    }

    async function fetchPassage(ref) {
      const cached = getCachedPassage(ref);
      if (cached) return cached;

      const res = await fetch(`${API_PROXY}?q=${encodeURIComponent(ref)}`, {
        cache: "no-store"
      });

      const data = await res.json().catch(() => ({}));

      if (!res.ok) {
        throw new Error(data.error || data.detail || "Unable to load passage.");
      }

      const text = data.text || "";
      setCachedPassage(ref, text);
      return text;
    }

    function wrapVerseNumbers(html) {
      return html
        .replace(/(^|<br>|\n)(\d{1,3})(\s)/g, '$1<span class="vnum">$2</span>$3')
        .replace(/(\s)(\d{1,3})(\s)/g, '$1<span class="vnum">$2</span>$3');
    }

    function formatText(rawText) {
      const lines = rawText.split("\n");
      const candidates = lines.filter(l => l.trim().length > 0);

      const shortLines = candidates.filter(l => l.trim().length <= 55).length;
      const spacedLines = candidates.filter(l => /^\s{2,}/.test(l)).length;

      const isPoetry =
        candidates.length >= 4 &&
        (spacedLines >= Math.max(2, candidates.length * .25) ||
         shortLines >= candidates.length * .7);

      let html;

      if (isPoetry) {
        html = `<div class="poetry">` + lines.map(line => {
          if (!line.trim()) return `<span class="line"><br></span>`;
          return `<span class="line">${escapeHtml(line)}</span>`;
        }).join("") + `</div>`;
      } else {
        html = escapeHtml(rawText).replace(/\n/g, "<br>");
      }

      return wrapVerseNumbers(html);
    }

    function isRead(iso) {
      try {
        return localStorage.getItem(READ_PREFIX + iso) === "1";
      } catch {
        return false;
      }
    }

    function setRead(iso, value) {
      try {
        localStorage.setItem(READ_PREFIX + iso, value ? "1" : "0");
      } catch {}
    }

    function updateProgress(anchorISO) {
      const monday = getMondayISO(anchorISO);
      let total = 0;
      let read = 0;

      for (let i = 0; i < 6; i++) {
        const iso = addDaysISO(monday, i);
        if (plan[iso]) {
          total++;
          if (isRead(iso)) read++;
        }
      }

      const percent = total ? Math.round((read / total) * 100) : 0;
      progressFill.style.width = percent + "%";
    }

    function renderWeekLinks(anchorISO) {
      weekLinks.innerHTML = "";
      const monday = getMondayISO(anchorISO);

      for (let i = 0; i < 6; i++) {
        const iso = addDaysISO(monday, i);
        const hasReading = !!plan[iso];

        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = formatShort(iso) + (isRead(iso) ? " ✓" : "");
        btn.disabled = !hasReading;

        btn.addEventListener("click", () => pickDate(iso));
        weekLinks.appendChild(btn);
      }
    }

    async function loadReading(dateISO) {
      currentDate = dateISO;
      const ref = plan[dateISO];
      const today = isoToday();

      readToggle.checked = isRead(dateISO);

      if (!ref) {
        readingRef.textContent =
          dateISO === today ? "Today — No reading scheduled" : `${dateISO} — No reading scheduled`;
        readingText.textContent = "";
        updateProgress(dateISO);
        return;
      }

      readingRef.textContent =
        dateISO === today ? `Today — ${ref}` : `${dateISO} — ${ref}`;

      readingText.textContent = "Loading…";

      try {
        const text = await fetchPassage(ref);
        readingText.innerHTML = formatText(text);
      } catch (error) {
        readingText.textContent =
          "Unable to load the passage. If this is the first visit in a while, refresh once.";
      }

      updateProgress(dateISO);
    }

    function pickDate(iso) {
      picker.value = iso;
      renderWeekLinks(iso);
      loadReading(iso);
    }

    function savePreference(key, value) {
      try {
        localStorage.setItem(key, value ? "1" : "0");
      } catch {}
    }

    function getPreference(key) {
      try {
        return localStorage.getItem(key) === "1";
      } catch {
        return false;
      }
    }

    readingModeToggle.addEventListener("change", () => {
      document.body.classList.toggle("reading-mode", readingModeToggle.checked);
      savePreference("lh_reading_mode", readingModeToggle.checked);
    });

    darkModeToggle.addEventListener("change", () => {
      document.body.classList.toggle("dark", darkModeToggle.checked);
      savePreference("lh_dark_mode", darkModeToggle.checked);
    });

    readToggle.addEventListener("change", () => {
      setRead(currentDate, readToggle.checked);
      renderWeekLinks(currentDate);
      updateProgress(currentDate);
    });

    prevBtn.addEventListener("click", () => {
      pickDate(addDaysISO(currentDate, -1));
    });

    nextBtn.addEventListener("click", () => {
      pickDate(addDaysISO(currentDate, 1));
    });

    (async function init() {
      try {
        await loadCSV();

        readingModeToggle.checked = getPreference("lh_reading_mode");
        darkModeToggle.checked = getPreference("lh_dark_mode");

        document.body.classList.toggle("reading-mode", readingModeToggle.checked);
        document.body.classList.toggle("dark", darkModeToggle.checked);

        picker.addEventListener("change", () => pickDate(picker.value));

        pickDate(isoToday());
      } catch {
        readingRef.textContent = "Reading plan unavailable";
        readingText.textContent = "The reading plan could not be loaded.";
      }
    })();
  </script>
</body>
</html>
